name: Publish SDK

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@terrabase-dev"

      - name: Publish npm package
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --tag next
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload descriptor to release
        run: gh release upload ${{ github.ref_name }} docs/descriptor.bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
