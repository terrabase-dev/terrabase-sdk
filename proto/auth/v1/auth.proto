syntax = "proto3";

package auth.v1;

import "authz/v1/authz.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "user/v1/user.proto";
import "user_role/v1/user_role.proto";

option go_package = "github.com/terrabase-dev/terrabase-sdk/specs/auth/v1;authv1";

message LoginRequest {
  // The user's email address. Required if not calling this endpoint from an authenticated context.
  string email = 1;

  // The user's password. Required if not calling this endpoint from an authenticated context.
  string password = 2;

  // Required if calling this endpoint from an authenticated context
  oneof mfa {
    // An MFA code
    string mfa_code = 3;

    // A recovery code
    string recovery_code = 4;
  }
}

message LoginResponse {
  // The logged in user
  user.v1.User user = 1;

  // The logged in user's access token
  string access_token = 2;

  // Whether or not the user is required to setup MFA
  bool mfa_setup_required = 3;

  // Whether or not an MFA code is required to login
  bool mfa_required = 4;
}

message VerifyPasswordRequest {
  // The user's email address
  string email = 1 [(google.api.field_behavior) = REQUIRED];

  // The user's password
  string password = 2 [(google.api.field_behavior) = REQUIRED];
}

message VerifyPasswordResponse {
  // Whether or not the user's password is correct
  bool correct = 1;
}

message ChangePasswordRequest {
  // The user's email address
  string email = 1 [(google.api.field_behavior) = REQUIRED];

  // The user's current password
  string current_password = 2 [(google.api.field_behavior) = REQUIRED];

  // The user's new password
  string new_password = 3 [(google.api.field_behavior) = REQUIRED];
}

message ChangePasswordResponse {
  // The user
  user.v1.User user = 1;
}

message WhoAmIRequest {}

message WhoAmIResponse {
  // The logged in user
  user.v1.User user = 1;

  // The scopes the user has
  repeated authz.v1.Scope scopes = 2;
}

message LogoutRequest {
  // The session to logout of
  string session_id = 1;
}

message LogoutResponse {}

message Session {
  // The unique ID of the session
  string id = 1;

  // The user agent the session originated from
  string user_agent = 2;

  // The IP address the session originated from
  string ip = 3;

  // The time the session expires at
  google.protobuf.Timestamp expires_at = 4;

  // The time the session was last used at
  google.protobuf.Timestamp last_used_at = 5;

  // The time the session was created
  google.protobuf.Timestamp created_at = 6;

  // The user who created the session
  string created_by = 7;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  // A list of active sessions
  repeated Session sessions = 1;

  // The current session ID
  string current_session_id = 2;
}

message StartMFASetupRequest {}

message StartMFASetupResponse {
  // The TOTP URL to be rendered in a QR code
  string totp_url = 1;

  // The secret key for manual entry
  string secret_key = 2;
}

message VerifyMFASetupRequest {
  // The MFA code generated by an authenticator app
  string code = 1 [(google.api.field_behavior) = REQUIRED];
}

message VerifyMFASetupResponse {
  // A list of recovery codes
  repeated string recovery_codes = 1;
}

message GenerateRecoveryCodesRequest {}

message GenerateRecoveryCodesResponse {
  // A list of recovery codes
  repeated string recovery_codes = 1;
}

message DisableMFARequest {}

message DisableMFAResponse {}

message CreateMachineUserRequest {
  // The name of the new machine user
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // The default role of the new machine user
  user_role.v1.UserRole default_role = 2 [(google.api.field_behavior) = REQUIRED];

  // The type of the new machine user
  user.v1.UserType user_type = 3 [(google.api.field_behavior) = REQUIRED];

  // The ID of the user that owns the new machine user
  string owner_user_id = 4 [(google.api.field_behavior) = REQUIRED];
}

message CreateMachineUserResponse {
  // The machine user that was created
  user.v1.User machine_user = 1;
}

enum ApiKeyOwnerType {
  // Default - should not use
  API_KEY_OWNER_TYPE_UNSPECIFIED = 0;

  // A human user
  API_KEY_OWNER_TYPE_USER = 1;

  // A bot user
  API_KEY_OWNER_TYPE_BOT = 2;

  // A service principal
  API_KEY_OWNER_TYPE_SERVICE = 3;
}

message ApiKey {
  // The unique ID of the API key
  string id = 1;

  // The name of the API key
  string name = 2;

  // The scopes the API key has
  repeated authz.v1.Scope scopes = 3;

  // The ID of the user that owns the API key
  string owner_id = 4;

  // The type of user that owns the API key
  ApiKeyOwnerType owner_type = 5;

  // The prefix of the API key
  string prefix = 6;

  // The time the API key was created
  google.protobuf.Timestamp created_at = 7;

  // The time the API key expires
  google.protobuf.Timestamp expires_at = 8;

  // The time the API key was last used
  google.protobuf.Timestamp last_used_at = 9;

  // The time the API key was revoked
  google.protobuf.Timestamp revoked_at = 10;
}

message CreateApiKeyRequest {
  // The name of the API key
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // The type of the user that owns the API key
  ApiKeyOwnerType owner_type = 2 [(google.api.field_behavior) = REQUIRED];

  // The ID of the user that owns the API key
  string owner_id = 3 [(google.api.field_behavior) = REQUIRED];

  // The scopes the API key has
  repeated authz.v1.Scope scopes = 4 [(google.api.field_behavior) = REQUIRED];

  // Hours until the API key expires. If unset, key does not expire.
  optional int64 ttl_hours = 5;
}

message CreateApiKeyResponse {
  // The access token for the API key
  string api_key_token = 1;

  // The API key that was created
  ApiKey api_key = 2;
}

message ListApiKeysRequest {
  // The type of user that owns API keys
  ApiKeyOwnerType owner_type = 1;

  // The unique ID of the user that owns an API key
  string owner_id = 2;
}

message ListApiKeysResponse {
  // A list of API keys
  repeated ApiKey api_keys = 1;
}

message RevokeApiKeyRequest {
  // The ID of the API key to revoke
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // The reason for revoking the API key
  string reason = 2;
}

message RevokeApiKeyResponse {}

message RotateApiKeyRequest {
  // The ID of the API key to rotate
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // The scopes the new API key should have. If unset, inherits from the existing API key.
  repeated authz.v1.Scope scopes = 2;

  // Hours until the new API key expires. If unset, inherits from the existing API key.
  optional int64 ttl_hours = 3;
}

message RotateApiKeyResponse {
  // The new access token for the API key
  string api_key_token = 1;

  // The new API key
  ApiKey api_key = 2;
}

message ExchangeOIDCTokenRequest {
  // The raw JWT issued by the CI provider
  string oidc_jwt = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the Terrabase project this pipeline is claiming to represent
  string project_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ExchangeOIDCTokenResponse {
  // A short lived Terrabase access token
  string access_token = 1;
}

service AuthService {
  // Login to a Terrabase instance with a user account
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (authz.v1.auth_required) = false;
  }

  // Verify a user's password
  rpc VerifyPassword(VerifyPasswordRequest) returns (VerifyPasswordResponse) {
    option (authz.v1.auth_required) = false;
  }

  // Change a user's password
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Retrieve details about the logged in user
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Logout of a Terrabase instance
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (authz.v1.auth_required) = false;
  }

  // List currently active sessions
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option (authz.v1.auth_required) = true;
  }

  // Setup multi-factor authentication
  rpc StartMFASetup(StartMFASetupRequest) returns (StartMFASetupResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Verify a multi-factor code for setting up MFA
  rpc VerifyMFASetup(VerifyMFASetupRequest) returns (VerifyMFASetupResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Generate new recovery codes
  rpc GenerateRecoveryCodes(GenerateRecoveryCodesRequest) returns (GenerateRecoveryCodesResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Disable multi-factor authentication
  rpc DisableMFA(DisableMFARequest) returns (DisableMFAResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Create a machine user (bot or service principal)
  rpc CreateMachineUser(CreateMachineUserRequest) returns (CreateMachineUserResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
  }

  // Create an API key. API keys can be owned by human users or machine users
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
    option (authz.v1.owner_id_field) = "owner_id";
  }

  // List API keys owned by a user
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
    option (authz.v1.owner_id_field) = "owner_id";
  }

  // Revoke an API key
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Rotate an API key
  rpc RotateApiKey(RotateApiKeyRequest) returns (RotateApiKeyResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.admin_or_self) = true;
  }

  // Exchange a CI provider's OIDC token for a short-lived Terrabase access token
  rpc ExchangeOIDCToken(ExchangeOIDCTokenRequest) returns (ExchangeOIDCTokenResponse) {
    option (authz.v1.auth_required) = false;
  }
}
