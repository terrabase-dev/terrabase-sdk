syntax = "proto3";

package application.v1;

import "authz/v1/authz.proto";
import "environment/v1/environment.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "team/v1/team.proto";
import "team_application_access_grant/v1/team_application_access_grant.proto";

option go_package = "github.com/terrabase-dev/terrabase-sdk/specs/application/v1;applicationv1";

// A Terrabase application can be deployed in multiple environments, each with their own workspace
message Application {
  // The unique ID of the application
  string id = 1;

  // The name of the application
  string name = 2;

  // The application's slug (used in URLs)
  string slug = 3;

  // The description of the application
  string description = 4;

  // The color of the application
  string color = 5;

  // The time the application was created
  google.protobuf.Timestamp created_at = 6;

  // The user who created the application
  string created_by = 7;

  // The time the application was last updated at
  google.protobuf.Timestamp updated_at = 8;

  // The user who last updated the application
  string updated_by = 9;
}

message ApplicationSummary {
  // The application
  Application application = 1;

  // The application environments
  repeated environment.v1.Environment environments = 2;
}

message CreateApplicationRequest {
  // The name of the application
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the team that owns the application
  string team_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The application's slug. A reasonable default will be generated if not provided.
  string slug = 3;

  // The description of the application
  optional string description = 4;

  // The color of the application
  optional string color = 5;
}

message CreateApplicationResponse {
  // The application that was created
  Application application = 1;
}

message GetApplicationRequest {
  oneof key {
    // The unique ID of the application
    string id = 1;

    // The application's slug
    string slug = 2;
  }
}

message GetApplicationResponse {
  // The application information
  ApplicationSummary application_summary = 1;
}

message ListApplicationsRequest {
  // The ID of a team that owns applications
  string team_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The number of applications on each page of results
  optional int32 page_size = 2;

  // The token to retrieve the next page of results
  optional string page_token = 3;
}

message ListApplicationsResponse {
  // A list of application information
  repeated ApplicationSummary application_summaries = 1;

  // The token to retrieve the next page of results
  optional string next_page_token = 2;
}

message UpdateApplicationRequest {
  // The unique ID of the application to update
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // The new name of the application
  optional string name = 2;

  // The new slug for the application
  optional string slug = 3;

  // The new description of the application
  optional string description = 4;

  // The new color of the application
  optional string color = 5;
}

message UpdateApplicationResponse {
  // The updated application
  Application application = 1;
}

message DeleteApplicationRequest {
  // The unique ID of the application to delete
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message DeleteApplicationResponse {}

message GrantTeamAccessRequest {
  // A list of team access grants
  repeated team_application_access_grant.v1.CreateTeamApplicationAccessGrantRequest team_access_grants = 1 [(google.api.field_behavior) = REQUIRED];
}

message GrantTeamAccessResponse {}

message RevokeTeamAccessRequest {
  // The unique ID of the application
  string application_id = 1 [(google.api.field_behavior) = REQUIRED];

  // A list of team IDs whose access to the application should be revoked
  team.v1.TeamIds team_ids = 2 [(google.api.field_behavior) = REQUIRED];
}

message RevokeTeamAccessResponse {}

service ApplicationService {
  // Create a new application
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
    option (authz.v1.elevation_possible) = true;
  }

  // Retrieve details about a single application
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_READ;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
  }

  // List applications owned by a specific team
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_READ;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
  }

  // Change details about an application
  rpc UpdateApplication(UpdateApplicationRequest) returns (UpdateApplicationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
    option (authz.v1.elevation_possible) = true;
  }

  // Delete an application
  rpc DeleteApplication(DeleteApplicationRequest) returns (DeleteApplicationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
    option (authz.v1.elevation_possible) = true;
  }

  // Grant access to an application to a single team or multiple teams
  rpc GrantTeamAccess(GrantTeamAccessRequest) returns (GrantTeamAccessResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
    option (authz.v1.elevation_possible) = true;
  }

  // Revoke access to an application from a single team or multiple teams
  rpc RevokeTeamAccess(RevokeTeamAccessRequest) returns (RevokeTeamAccessResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_APPLICATION_WRITE;
    option (authz.v1.elevation_possible) = true;
  }
}
