syntax = "proto3";

package user_membership.v1;

import "authz/v1/authz.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "operation/v1/operation.proto";
import "user_role/v1/user_role.proto";

option go_package = "github.com/terrabase-dev/terrabase-sdk/specs/user_membership/v1;userMembershipv1";

// Defines a user who has access to an organization
message OrganizationUser {
  // The unique ID of the organization user
  string id = 1;

  // The ID of the user that has access to the organization
  string user_id = 2;

  // The ID of the organization the user has access to
  string organization_id = 3;

  // The role granted to the user in the organization
  user_role.v1.UserRole user_role = 4;

  // The time the user was granted access to the organization
  google.protobuf.Timestamp created_at = 5;

  // The user who granted the user access to the organization
  string created_by = 6;

  // The time the user's access in the organization was last changed
  google.protobuf.Timestamp updated_at = 7;

  // The user who last changed the user's access in the organization
  string updated_by = 8;
}

message AddUserToOrganizationRequest {
  // The user's first name
  string first_name = 1 [(google.api.field_behavior) = REQUIRED];

  // The user's last name
  string last_name = 2 [(google.api.field_behavior) = REQUIRED];

  // The user's email address
  string email = 3 [(google.api.field_behavior) = REQUIRED];

  // The user's password
  string password = 4 [(google.api.field_behavior) = REQUIRED];

  // The role the user should be granted in the organization
  user_role.v1.UserRole user_role = 5 [(google.api.field_behavior) = REQUIRED];

  // The ID of the organization to add the user to
  string organization_id = 6 [(google.api.field_behavior) = REQUIRED];
}

message AddUserToOrganizationResponse {
  OrganizationUser organization_user = 1;
}

message RemoveUserFromOrganizationRequest {
  // The ID of the user to remove from the organization
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the organization to remove the user from
  string organization_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RemoveUserFromOrganizationResponse {}

message SetUserOrganizationRoleRequest {
  // The ID of the user whose role should in the organization should be set
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the organization to set the user's role in
  string organization_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The role to grant to the user
  user_role.v1.UserRole user_role = 3 [(google.api.field_behavior) = REQUIRED];
}

message SetUserOrganizationRoleResponse {
  OrganizationUser organization_user = 1;
}

// Defines a user who has access to a team
message TeamUser {
  // The unique ID of the team user
  string id = 1;

  // The ID of the user that has access to the team
  string user_id = 2;

  // The ID of the team the user has access to
  string team_id = 3;

  // The role granted to the user in the team
  user_role.v1.UserRole user_role = 4;

  // The time the user was granted access to the team
  google.protobuf.Timestamp created_at = 5;

  // The user who granted the user access to the team
  string created_by = 6;

  // The time the user's access in the team was last changed
  google.protobuf.Timestamp updated_at = 7;

  // The user who last changed the user's access in the team
  string updated_by = 8;
}

message AddUserToTeamRequest {
  // The ID of the user to add to the team
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the team to add the user to
  string team_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The role the user should be granted in the team
  user_role.v1.UserRole user_role = 3 [(google.api.field_behavior) = REQUIRED];
}

message AddUserToTeamResponse {
  TeamUser team_user = 1;
}

message RemoveUserFromTeamRequest {
  // The ID of the user to remove from the team
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the team to remove the user from
  string team_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RemoveUserFromTeamResponse {}

message SetUserTeamRoleRequest {
  // The ID of the user whose role should in the team should be set
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the team to set the user's role in
  string team_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The role to grant to the user
  user_role.v1.UserRole user_role = 3 [(google.api.field_behavior) = REQUIRED];
}

message SetUserTeamRoleResponse {
  TeamUser team_user = 1;
}

// Defines a user who has access to a workspace
message WorkspaceUser {
  // The unique ID of the workspace user
  string id = 1;

  // The ID of the user that has access to the workspace
  string user_id = 2;

  // The ID of the workspace the user has access to
  string workspace_id = 3;

  // The role granted to the user in the workspace
  user_role.v1.UserRole user_role = 4;

  // The Terraform operations the user is allowed to perform on a workspace
  repeated operation.v1.TerraformOperation allowed_operations = 5;

  // The time the user was granted access to the workspace
  google.protobuf.Timestamp created_at = 6;

  // The user who granted the user access to the workspace
  string created_by = 7;

  // The time the user's access in the workspace was last changed
  google.protobuf.Timestamp updated_at = 8;

  // The user who last changed the user's access in the workspace
  string updated_by = 9;
}

message AddUserToWorkspaceRequest {
  // The ID of the user to add to the workspace
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the workspace to add the user to
  string workspace_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The role the user should be granted in the workspace
  user_role.v1.UserRole user_role = 3 [(google.api.field_behavior) = REQUIRED];

  // The Terraform operations the user is allowed to perform on a workspace
  repeated operation.v1.TerraformOperation allowed_operations = 4 [(google.api.field_behavior) = REQUIRED];
}

message AddUserToWorkspaceResponse {
  WorkspaceUser workspace_user = 1;
}

message RemoveUserFromWorkspaceRequest {
  // The ID of the user to remove from the workspace
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the workspace to remove the user from
  string workspace_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RemoveUserFromWorkspaceResponse {}

message SetUserWorkspaceRoleRequest {
  // The ID of the user whose role should in the workspace should be set
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the workspace to set the user's role in
  string workspace_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The role to grant to the user
  user_role.v1.UserRole user_role = 3 [(google.api.field_behavior) = REQUIRED];
}

message SetUserWorkspaceRoleResponse {
  WorkspaceUser workspace_user = 1;
}

message SetUserWorkspaceAllowedOperationsRequest {
  // The ID of the user whose allowed Terraform operations should be set
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The ID of the workspace to set the user's allowed Terraform operations in
  string workspace_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The Terraform operations to allow the user to perform
  repeated operation.v1.TerraformOperation allowed_operations = 3 [(google.api.field_behavior) = REQUIRED];
}

message SetUserWorkspaceAllowedOperationsResponse {
  WorkspaceUser workspace_user = 1;
}

service UserMembershipService {
  // Grant a user access to an organization
  rpc AddUserToOrganization(AddUserToOrganizationRequest) returns (AddUserToOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Revoke a user's access to an organization
  rpc RemoveUserFromOrganization(RemoveUserFromOrganizationRequest) returns (RemoveUserFromOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Set a user's role in an organization
  rpc SetUserOrganizationRole(SetUserOrganizationRoleRequest) returns (SetUserOrganizationRoleResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Grant a user access to a team
  rpc AddUserToTeam(AddUserToTeamRequest) returns (AddUserToTeamResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_TEAM_WRITE;
  }

  // Revoke a user's access to a team
  rpc RemoveUserFromTeam(RemoveUserFromTeamRequest) returns (RemoveUserFromTeamResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_TEAM_WRITE;
  }

  // Set a user's role in a team
  rpc SetUserTeamRole(SetUserTeamRoleRequest) returns (SetUserTeamRoleResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_TEAM_WRITE;
  }

  // Grant a user access to a workspace
  rpc AddUserToWorkspace(AddUserToWorkspaceRequest) returns (AddUserToWorkspaceResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_WORKSPACE_WRITE;
  }

  // Revoke a user's access to a workspace
  rpc RemoveUserFromWorkspace(RemoveUserFromWorkspaceRequest) returns (RemoveUserFromWorkspaceResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_WORKSPACE_WRITE;
  }

  // Set a user's role in a workspace
  rpc SetUserWorkspaceRole(SetUserWorkspaceRoleRequest) returns (SetUserWorkspaceRoleResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_WORKSPACE_WRITE;
  }

  // Set a user's allowed Terraform operations in a workspace
  rpc SetUserWorkspaceAllowedOperations(SetUserWorkspaceAllowedOperationsRequest) returns (SetUserWorkspaceAllowedOperationsResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_WORKSPACE_WRITE;
  }
}
