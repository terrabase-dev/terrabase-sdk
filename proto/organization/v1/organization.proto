syntax = "proto3";

package organization.v1;

import "authz/v1/authz.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/terrabase-dev/terrabase-sdk/specs/organization/v1;organizationv1";

enum Subscription {
  // Default - should not use
  SUBSCRIPTION_UNSPECIFIED = 0;

  // Free subscription
  SUBSCRIPTION_FREE = 1;

  // Team subscription
  SUBSCRIPTION_TEAM = 2;

  // Enterprise subscription
  SUBSCRIPTION_ENTERPRISE = 3;
}

// A Terrabase organization is the top level grouping of resources in a Terrabase instance
message Organization {
  // The unique ID of the organization
  string id = 1;

  // The name of the organization
  string name = 2;

  // The organization's slug (used in URLs)
  string slug = 3;

  // The version of the organization's logo, if uploaded
  string logo_version = 4;

  // Whether or not MFA is required for all users
  bool mfa_required = 5;

  // The time the organization was created
  google.protobuf.Timestamp created_at = 6;

  // The user who created the organization
  string created_by = 7;

  // The time the organization was last updated at
  google.protobuf.Timestamp updated_at = 8;

  // The user who last updated the organization
  string updated_by = 9;
}

message CreateOrganizationRequest {
  // The name of the organization to create
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // The organization's slug. A reasonable default will be generated if not provided.
  string slug = 2;

  // Whether or not MFA is required for all users
  bool mfa_required = 3;
}

message CreateOrganizationResponse {
  // The organization that was created
  Organization organization = 1;
}

message GetOrganizationRequest {
  oneof key {
    // The unique ID of the organization
    string id = 1;

    // The organization's slug
    string slug = 2;
  }
}

message GetOrganizationResponse {
  // The organization
  Organization organization = 1;
}

message ListOrganizationsRequest {
  // The number of organizations on each page of results
  optional int32 page_size = 1;

  // The token to retrieve the next page of results
  optional string page_token = 2;
}

message ListOrganizationsResponse {
  // A list of organizations
  repeated Organization organizations = 1;

  // The token to retrieve the next page of results
  optional string next_page_token = 2;
}

message UpdateOrganizationRequest {
  // The unique ID of the organization to update
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // The new name of the organization
  optional string name = 2;

  // The new slug for the organization
  optional string slug = 3;

  // Used to remove a logo
  optional string logo_version = 4;

  // Whether or not MFA is required for all users
  optional bool mfa_required = 5;
}

message UpdateOrganizationResponse {
  // The updated organization
  Organization organization = 1;
}

message DeleteOrganizationRequest {
  // The unique ID of the organization to delete
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message DeleteOrganizationResponse {}

message GetLogoUploadUrlRequest {
  // The unique ID of the organization to get a presigned URL for to upload its logo
  string organization_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The content type of the logo
  string content_type = 2 [(google.api.field_behavior) = REQUIRED];
}

message GetLogoUploadUrlResponse {
  // The presigned URL to upload an organization's logo
  string upload_url = 1;

  // Headers to include when calling the presigned URL
  map<string, string> headers = 2;

  // The version of the logo (to be used in finalize)
  string logo_version = 3;
}

message FinalizeLogoUploadRequest {
  // The unique ID of the organization to finalize the logo upload for
  string organization_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The version of the logo
  string logo_version = 2 [(google.api.field_behavior) = REQUIRED];
}

message FinalizeLogoUploadResponse {
  // The organization
  Organization organization = 1;
}

message GetLogoUrlRequest {
  // The unique ID of the organization to get a presigned URL for to download its logo
  string organization_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetLogoUrlResponse {
  // The presigned URL to download an organization's logo
  string url = 1;
}

message License {
  // The entity the Terrabase license was granted to
  string licensee = 1;

  // The subscription level the license grants
  Subscription subscription = 2;

  // When the license expires
  google.protobuf.Timestamp expires_at = 3;
}

message GetLicenseInfoRequest {}

message GetLicenseInfoResponse {
  // The license information
  License license = 1;
}

service OrganizationService {
  // Create a new organization
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Retrieve details about a single organization
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_READ;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // List all organizations
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_READ;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Change details about an organization
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Delete an organization
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Get a presigned URL to upload an organization's logo
  rpc GetLogoUploadUrl(GetLogoUploadUrlRequest) returns (GetLogoUploadUrlResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Finalize a logo upload
  rpc FinalizeLogoUpload(FinalizeLogoUploadRequest) returns (FinalizeLogoUploadResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Get a presigned URL to download an organization's logo
  rpc GetLogoUrl(GetLogoUrlRequest) returns (GetLogoUrlResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
    option (authz.v1.required_scopes) = SCOPE_ORG_WRITE;
  }

  // Retrieve license information for the Terrabase instance
  rpc GetLicenseInfo(GetLicenseInfoRequest) returns (GetLicenseInfoResponse) {
    option (authz.v1.auth_required) = true;
    option (authz.v1.required_scopes) = SCOPE_ADMIN;
  }
}
